version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: purferme_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-purferme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-purferme_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-purferme} -d ${POSTGRES_DB:-purferme_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - purferme_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: purferme_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-purferme}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-purferme_db}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-purferme}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-purferme_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - purferme_network

networks:
  purferme_network:
    driver: bridge

volumes:
  postgres_data:
