version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: purferme_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: purferme
      POSTGRES_PASSWORD: password
      POSTGRES_DB: purferme_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U purferme -d purferme_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: purferme_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://purferme:password@db:5432/purferme_db
      SYNC_DATABASE_URL: postgresql://purferme:password@db:5432/purferme_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
